name: TrixMac

options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEVELOPMENT_TEAM: HGY33KYKQ2

targets:
  TrixMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    preBuildScripts:
      - script: |
          bash "$SRCROOT/scripts/build-trix-core-universal.sh"
        name: Build trix-core universal archive
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/../../target/macos-universal/$(CONFIGURATION)/libtrix_core.a
        showEnvVars: false
    sources:
      - path: Sources/TrixMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp
        PRODUCT_NAME: TrixMac
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TrixMac.entitlements
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.social-networking
        OTHER_SWIFT_FLAGS:
          - -Xcc
          - -fmodule-map-file=$(SRCROOT)/Sources/trix_coreFFI/module.modulemap
        OTHER_LDFLAGS:
          - $(SRCROOT)/../../target/macos-universal/$(CONFIGURATION)/libtrix_core.a
      configs:
        Debug:
          ENABLE_TESTABILITY: YES
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: development
        Release:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: production
    scheme:
      gatherCoverageData: false
      testTargets:
        - TrixMacTests
        - TrixMacUITests

  TrixMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/TrixMacTests
    dependencies:
      - target: TrixMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.tests
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        OTHER_SWIFT_FLAGS:
          - -Xcc
          - -fmodule-map-file=$(SRCROOT)/Sources/trix_coreFFI/module.modulemap
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/TrixMac.app/Contents/MacOS/TrixMac"
        BUNDLE_LOADER: "$(TEST_HOST)"

  TrixMacUITests:
    type: bundle.ui-testing
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: TrixMacUITests
      - path: Sources/TrixMac/Support/MacUITestSupport.swift
      - path: Sources/TrixMac/Support/TrixMacInteropSupport.swift
    dependencies:
      - target: TrixMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.uitests
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        TEST_TARGET_NAME: TrixMac
