name: TrixiOS
# Shared `UITestSupport` sources (e.g. `TrixUITestSupport`, `TrixInteropSupport`) ship in the app + UI-test targets for launch-contract parity.

options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  TrixiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    preBuildScripts:
      - script: |
          bash "$SRCROOT/scripts/generate-trix-core-bridge.sh"
        name: Generate trix-core iOS bridge
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/TrixiOS/Bridge/Generated/trix_core.swift
          - $(SRCROOT)/../../target/aarch64-apple-ios/release/libtrix_core.a
          - $(SRCROOT)/../../target/ios-simulator-universal/release/libtrix_core.a
        showEnvVars: false
    sources:
      - path: TrixiOS
        excludes:
          - Bridge/Artifacts
      - path: UITestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp
        PRODUCT_NAME: Trix
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TrixiOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HGY33KYKQ2
        CODE_SIGN_ENTITLEMENTS: TrixiOS/TrixiOS.entitlements
        OTHER_SWIFT_FLAGS:
          - -Xcc
          - -fmodule-map-file=$(SRCROOT)/TrixiOS/Bridge/Generated/module.modulemap
        OTHER_LDFLAGS[sdk=iphoneos*]:
          - $(SRCROOT)/../../target/aarch64-apple-ios/release/libtrix_core.a
        OTHER_LDFLAGS[sdk=iphonesimulator*]:
          - $(SRCROOT)/../../target/ios-simulator-universal/release/libtrix_core.a
      configs:
        Debug:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: development
        Release:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: production
    scheme:
      gatherCoverageData: false
      testTargets:
        - TrixiOSTests
        - TrixiOSUITests

  TrixiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrixiOSTests
    dependencies:
      - target: TrixiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.tests
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HGY33KYKQ2
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Trix.app/Trix"
        BUNDLE_LOADER: "$(TEST_HOST)"
        OTHER_SWIFT_FLAGS:
          - -Xcc
          - -fmodule-map-file=$(SRCROOT)/TrixiOS/Bridge/Generated/module.modulemap

  TrixiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrixiOSUITests
      - path: UITestSupport
    dependencies:
      - target: TrixiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.uitests
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HGY33KYKQ2
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_TARGET_NAME: TrixiOS
        OTHER_SWIFT_FLAGS:
          - -Xcc
          - -fmodule-map-file=$(SRCROOT)/TrixiOS/Bridge/Generated/module.modulemap
