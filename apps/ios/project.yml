name: TrixiOS
# Shared `UITestSupport` sources (e.g. `TrixUITestSupport`, `TrixInteropSupport`) ship in the app + UI-test targets for launch-contract parity.

options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  TrixiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrixiOS
        excludes:
          - Bridge/Artifacts
      - path: UITestSupport
    dependencies:
      - framework: Vendor/TrixCoreFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp
        PRODUCT_NAME: Trix
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TrixiOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HGY33KYKQ2
    scheme:
      gatherCoverageData: false
      testTargets:
        - TrixiOSTests
        - TrixiOSUITests

  TrixiOSTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrixiOSTests
    dependencies:
      - target: TrixiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.tests
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HGY33KYKQ2
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Trix.app/Trix"
        BUNDLE_LOADER: "$(TEST_HOST)"

  TrixiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrixiOSUITests
      - path: UITestSupport
    dependencies:
      - target: TrixiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.uitests
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HGY33KYKQ2
        TARGETED_DEVICE_FAMILY: "1,2"
        TEST_TARGET_NAME: TrixiOS
