name: TrixiOS

options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

targets:
  TrixiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TrixiOS
        excludes:
          - Bridge/Artifacts
    dependencies:
      - framework: Vendor/TrixCoreFFI.xcframework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.trix.ios
        PRODUCT_NAME: Trix
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: TrixiOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_ASSET_PATHS: "\"TrixiOS/Resources\""
    scheme:
      gatherCoverageData: false
