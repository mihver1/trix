openapi: 3.1.0
info:
  title: Trix API
  version: 0.1.0
  summary: Scaffolded v0 API for the Trix backend
servers:
  - url: http://localhost:8080
tags:
  - name: system
  - name: auth
  - name: accounts
  - name: devices
  - name: chats
  - name: blobs
paths:
  /v0/system/health:
    get:
      operationId: getSystemHealth
      tags: [system]
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v0/system/version:
    get:
      operationId: getSystemVersion
      tags: [system]
      responses:
        '200':
          description: Build information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /v0/auth/challenge:
    post:
      operationId: createAuthChallenge
      tags: [auth]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v0/auth/session:
    post:
      operationId: createAuthSession
      tags: [auth]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v0/accounts:
    post:
      operationId: createAccount
      tags: [accounts]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v0/accounts/me:
    get:
      operationId: getCurrentAccount
      tags: [accounts]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v0/devices:
    get:
      operationId: listDevices
      tags: [devices]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v0/chats:
    get:
      operationId: listChats
      tags: [chats]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
    post:
      operationId: createChat
      tags: [chats]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
  /v0/blobs/uploads:
    post:
      operationId: createBlobUpload
      tags: [blobs]
      responses:
        '501':
          $ref: '#/components/responses/NotImplemented'
components:
  responses:
    NotImplemented:
      description: Endpoint scaffold exists but behavior is not implemented yet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ServiceStatus:
      type: string
      enum: [ok, degraded]
    HealthResponse:
      type: object
      required: [service, status, version, uptime_ms]
      properties:
        service:
          type: string
        status:
          $ref: '#/components/schemas/ServiceStatus'
        version:
          type: string
        uptime_ms:
          type: integer
          format: int64
    VersionResponse:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
        version:
          type: string
        git_sha:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

