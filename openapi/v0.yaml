openapi: 3.1.0
info:
  title: Trix API
  version: 0.1.0
  summary: v0 API for the Trix backend
servers:
  - url: http://localhost:8080
tags:
  - name: system
  - name: auth
  - name: accounts
  - name: devices
  - name: history_sync
  - name: key_packages
  - name: chats
  - name: inbox
  - name: blobs
  - name: admin
paths:
  /v0/system/health:
    get:
      operationId: getSystemHealth
      tags: [system]
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v0/system/version:
    get:
      operationId: getSystemVersion
      tags: [system]
      responses:
        '200':
          description: Build information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /v0/auth/challenge:
    post:
      operationId: createAuthChallenge
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v0/auth/session:
    post:
      operationId: createAuthSession
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSessionRequest'
      responses:
        '200':
          description: Session token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v0/accounts:
    post:
      operationId: createAccount
      tags: [accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponse'
  /v0/accounts/me:
    get:
      operationId: getCurrentAccount
      tags: [accounts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileResponse'
    patch:
      operationId: updateCurrentAccount
      tags: [accounts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAccountProfileRequest'
      responses:
        '200':
          description: Updated authenticated account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileResponse'
  /v0/accounts/me/feature-flags:
    get:
      operationId: getCurrentAccountFeatureFlags
      tags: [accounts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Merged feature flags for the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountFeatureFlagsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v0/accounts/me/debug/metrics:
    get:
      operationId: getCurrentAccountDebugMetricsStatus
      tags: [accounts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Active debug metrics session for this account and device, if any
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDebugMetricsStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Debug metrics are not enabled on this server
    post:
      operationId: submitCurrentAccountDebugMetrics
      tags: [accounts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitDebugMetricsRequest'
      responses:
        '204':
          description: Metrics batch accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Debug metrics are not enabled on this server
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v0/accounts/directory:
    get:
      operationId: searchAccountDirectory
      tags: [accounts]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: q
          schema:
            type: string
            nullable: true
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 50
        - in: query
          name: exclude_self
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Directory search results for accounts with active devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDirectoryResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v0/accounts/{account_id}:
    get:
      operationId: getAccount
      tags: [accounts]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Public account summary for an active account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DirectoryAccountSummary'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/accounts/{account_id}/key-packages:
    get:
      operationId: reserveAccountKeyPackages
      tags: [accounts, key_packages]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Reserved one key package per active device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountKeyPackagesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices:
    get:
      operationId: listDevices
      tags: [devices]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Devices for the authenticated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
  /v0/devices/push-token:
    put:
      operationId: registerApplePushToken
      tags: [devices]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterApplePushTokenRequest'
      responses:
        '200':
          description: APNs token registered for the authenticated device. Server-side delivery remains disabled until `trixd` has complete APNs credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterApplePushTokenResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
    delete:
      operationId: deleteApplePushToken
      tags: [devices]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: APNs token removed for the authenticated device
  /v0/devices/link-intents:
    post:
      operationId: createLinkIntent
      tags: [devices]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending device link intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLinkIntentResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v0/devices/link-intents/{link_intent_id}/complete:
    post:
      operationId: completeLinkIntent
      tags: [devices]
      parameters:
        - $ref: '#/components/parameters/LinkIntentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteLinkIntentRequest'
      responses:
        '200':
          description: Pending device created and waiting for approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteLinkIntentResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices/{device_id}/approve-payload:
    get:
      operationId: getApproveDevicePayload
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Canonical bootstrap payload for signing pending device approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceApprovePayloadResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices/{device_id}/transfer-bundle:
    get:
      operationId: getDeviceTransferBundle
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Encrypted transfer bundle for the authenticated device. The ciphertext is single-consume and will not be returned again after the first successful fetch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTransferBundleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/devices/{device_id}/transport-key:
    get:
      operationId: getDeviceTransportKey
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Device transport key visible to authenticated account members
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTransportKeyResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/devices/{device_id}/approve:
    post:
      operationId: approveDevice
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveDeviceRequest'
      responses:
        '200':
          description: Pending device approved and activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveDeviceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices/{device_id}/revoke:
    post:
      operationId: revokeDevice
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeDeviceRequest'
      responses:
        '200':
          description: Device revoked and server-side access cut off
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeDeviceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/history-sync/jobs:
    get:
      operationId: listHistorySyncJobs
      tags: [history_sync]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/HistorySyncJobRole'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/HistorySyncJobStatus'
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: History sync jobs assigned to the authenticated source device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorySyncJobListResponse'
  /v0/history-sync/jobs/request:
    post:
      operationId: requestChatBackfill
      tags: [history_sync]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestChatBackfillRequest'
      responses:
        '200':
          description: Chat backfill job scheduled for the authenticated target device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestChatBackfillResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/history-sync/jobs:request-repair:
    post:
      operationId: requestHistorySyncRepair
      tags: [history_sync]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestHistorySyncRepairRequest'
      responses:
        '200':
          description: One or more bounded timeline repair jobs scheduled for the authenticated target device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RequestHistorySyncRepairResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/history-sync/jobs/{job_id}/chunks:
    get:
      operationId: listHistorySyncChunks
      tags: [history_sync]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: History sync chunks visible to the authenticated target device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorySyncChunkListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: appendHistorySyncChunk
      tags: [history_sync]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AppendHistorySyncChunkRequest'
      responses:
        '200':
          description: Encrypted history sync chunk stored for the job. Replays of the same `(job_id, sequence_no)` with the same payload return the existing chunk result; payload mismatches return `409`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppendHistorySyncChunkResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/history-sync/jobs/{job_id}/complete:
    post:
      operationId: completeHistorySyncJob
      tags: [history_sync]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteHistorySyncJobRequest'
      responses:
        '200':
          description: History sync job marked completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteHistorySyncJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/key-packages:publish:
    post:
      operationId: publishKeyPackages
      tags: [key_packages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishKeyPackagesRequest'
      responses:
        '200':
          description: Key packages published for the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishKeyPackagesResponse'
  /v0/key-packages:reset:
    post:
      operationId: resetKeyPackages
      tags: [key_packages]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Expired available and reserved key packages for the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetKeyPackagesResponse'
  /v0/key-packages:reserve:
    post:
      operationId: reserveKeyPackages
      tags: [key_packages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReserveKeyPackagesRequest'
      responses:
        '200':
          description: Reserved key packages for the requested devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountKeyPackagesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats:
    get:
      operationId: listChats
      tags: [chats]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Chats visible to the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListResponse'
    post:
      operationId: createChat
      tags: [chats]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        '200':
          description: Chat created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatResponse'
  /v0/chats/{chat_id}:
    get:
      operationId: getChat
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Chat metadata and active membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/chats/{chat_id}/messages:
    post:
      operationId: createMessage
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '200':
          description: Message accepted. Replays of the same `message_id` with the same payload are idempotent and return the existing result; payload mismatches return `409`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMessageResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/history:
    get:
      operationId: getChatHistory
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - in: query
          name: after_server_seq
          schema:
            type: integer
            format: int64
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Server-stored encrypted history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/chats/{chat_id}/members:add:
    post:
      operationId: addChatMembers
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatMembersRequest'
      responses:
        '200':
          description: Accounts added to the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatMembersResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/members:remove:
    post:
      operationId: removeChatMembers
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatMembersRequest'
      responses:
        '200':
          description: Accounts removed from the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatMembersResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/devices:add:
    post:
      operationId: addChatDevices
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatDevicesRequest'
      responses:
        '200':
          description: Devices added to the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatDevicesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/devices:remove:
    post:
      operationId: removeChatDevices
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatDevicesRequest'
      responses:
        '200':
          description: Devices removed from the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatDevicesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/leave:
    post:
      operationId: leaveChat
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaveChatRequest'
      responses:
        '200':
          description: Left the chat on this device or all devices for the account; epoch advanced when a commit was supplied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaveChatResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/dm-global-delete:
    post:
      operationId: dmGlobalDelete
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DmGlobalDeleteRequest'
      responses:
        '200':
          description: DM closed for both accounts; chat is terminal until a new DM is created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmGlobalDeleteResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/inbox:
    get:
      operationId: getInbox
      tags: [inbox]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: after_inbox_id
          schema:
            type: integer
            format: int64
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Pending inbox items for the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxResponse'
  /v0/inbox/ack:
    post:
      operationId: ackInbox
      tags: [inbox]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckInboxRequest'
      responses:
        '200':
          description: Inbox items acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckInboxResponse'
  /v0/inbox/lease:
    post:
      operationId: leaseInbox
      tags: [inbox]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseInboxRequest'
      responses:
        '200':
          description: Inbox items leased for temporary delivery ownership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseInboxResponse'
  /v0/blobs/uploads:
    post:
      operationId: createBlobUpload
      tags: [blobs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlobUploadRequest'
      responses:
        '200':
          description: Blob upload slot created or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBlobUploadResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /v0/blobs/{blob_id}:
    put:
      operationId: putBlob
      tags: [blobs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlobId'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Blob stored and marked available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobMetadataResponse'
    get:
      operationId: getBlob
      tags: [blobs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlobId'
      responses:
        '200':
          description: Encrypted blob bytes
          headers:
            ETag:
              schema:
                type: string
            X-Trix-Blob-Id:
              schema:
                type: string
            X-Trix-Blob-Mime-Type:
              schema:
                type: string
            X-Trix-Blob-Sha256-B64:
              schema:
                type: string
            X-Trix-Blob-Upload-Status:
              schema:
                $ref: '#/components/schemas/BlobUploadStatus'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
    head:
      operationId: headBlob
      tags: [blobs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlobId'
      responses:
        '200':
          description: Blob metadata as headers
          headers:
            Content-Length:
              schema:
                type: integer
                format: int64
            Content-Type:
              schema:
                type: string
            ETag:
              schema:
                type: string
            X-Trix-Blob-Id:
              schema:
                type: string
            X-Trix-Blob-Mime-Type:
              schema:
                type: string
            X-Trix-Blob-Sha256-B64:
              schema:
                type: string
            X-Trix-Blob-Upload-Status:
              schema:
                $ref: '#/components/schemas/BlobUploadStatus'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/ws:
    get:
      operationId: openWebSocketSession
      tags: [inbox]
      security:
        - bearerAuth: []
      summary: Open websocket transport for low-latency inbox delivery
      description: |
        Upgrades the connection to a WebSocket used for low-latency inbox delivery.

        Guaranteed server frames in `v0`:
        - `hello`
        - `inbox_items`
        - `acked`
        - `pong`
        - `session_replaced`
        - `error`

        Guaranteed client frames in `v0`:
        - `ack`
        - `presence_ping`

        `typing_update` and `history_sync_progress` are accepted only as compatibility no-ops and are not part of the guaranteed realtime contract.
      responses:
        '101':
          description: WebSocket upgrade successful
