openapi: 3.1.0
info:
  title: Trix API
  version: 0.1.0
  summary: v0 API for the Trix backend
servers:
  - url: http://localhost:8080
tags:
  - name: system
  - name: auth
  - name: accounts
  - name: devices
  - name: history_sync
  - name: key_packages
  - name: chats
  - name: inbox
  - name: blobs
paths:
  /v0/system/health:
    get:
      operationId: getSystemHealth
      tags: [system]
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /v0/system/version:
    get:
      operationId: getSystemVersion
      tags: [system]
      responses:
        '200':
          description: Build information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionResponse'
  /v0/auth/challenge:
    post:
      operationId: createAuthChallenge
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthChallengeRequest'
      responses:
        '200':
          description: Challenge created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthChallengeResponse'
  /v0/auth/session:
    post:
      operationId: createAuthSession
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthSessionRequest'
      responses:
        '200':
          description: Session token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthSessionResponse'
  /v0/accounts:
    post:
      operationId: createAccount
      tags: [accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAccountRequest'
      responses:
        '200':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAccountResponse'
  /v0/accounts/me:
    get:
      operationId: getCurrentAccount
      tags: [accounts]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authenticated account profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileResponse'
  /v0/accounts/{account_id}/key-packages:
    get:
      operationId: reserveAccountKeyPackages
      tags: [accounts, key_packages]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/AccountId'
      responses:
        '200':
          description: Reserved one key package per active device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountKeyPackagesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices:
    get:
      operationId: listDevices
      tags: [devices]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Devices for the authenticated account
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceListResponse'
  /v0/devices/link-intents:
    post:
      operationId: createLinkIntent
      tags: [devices]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Pending device link intent created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateLinkIntentResponse'
  /v0/devices/link-intents/{link_intent_id}/complete:
    post:
      operationId: completeLinkIntent
      tags: [devices]
      parameters:
        - $ref: '#/components/parameters/LinkIntentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteLinkIntentRequest'
      responses:
        '200':
          description: Pending device created and waiting for approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteLinkIntentResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices/{device_id}/approve-payload:
    get:
      operationId: getApproveDevicePayload
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Canonical bootstrap payload for signing pending device approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceApprovePayloadResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices/{device_id}/transfer-bundle:
    get:
      operationId: getDeviceTransferBundle
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      responses:
        '200':
          description: Encrypted transfer bundle for the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceTransferBundleResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/devices/{device_id}/approve:
    post:
      operationId: approveDevice
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveDeviceRequest'
      responses:
        '200':
          description: Pending device approved and activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveDeviceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/devices/{device_id}/revoke:
    post:
      operationId: revokeDevice
      tags: [devices]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DeviceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevokeDeviceRequest'
      responses:
        '200':
          description: Device revoked and server-side access cut off
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevokeDeviceResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/history-sync/jobs:
    get:
      operationId: listHistorySyncJobs
      tags: [history_sync]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/HistorySyncJobStatus'
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: History sync jobs assigned to the authenticated source device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HistorySyncJobListResponse'
  /v0/history-sync/jobs/{job_id}/complete:
    post:
      operationId: completeHistorySyncJob
      tags: [history_sync]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteHistorySyncJobRequest'
      responses:
        '200':
          description: History sync job marked completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteHistorySyncJobResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/key-packages:publish:
    post:
      operationId: publishKeyPackages
      tags: [key_packages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishKeyPackagesRequest'
      responses:
        '200':
          description: Key packages published for the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublishKeyPackagesResponse'
  /v0/key-packages:reserve:
    post:
      operationId: reserveKeyPackages
      tags: [key_packages]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReserveKeyPackagesRequest'
      responses:
        '200':
          description: Reserved key packages for the requested devices
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountKeyPackagesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats:
    get:
      operationId: listChats
      tags: [chats]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Chats visible to the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatListResponse'
    post:
      operationId: createChat
      tags: [chats]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        '200':
          description: Chat created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatResponse'
  /v0/chats/{chat_id}:
    get:
      operationId: getChat
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      responses:
        '200':
          description: Chat metadata and active membership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatDetailResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/chats/{chat_id}/messages:
    post:
      operationId: createMessage
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '200':
          description: Message accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateMessageResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/history:
    get:
      operationId: getChatHistory
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
        - in: query
          name: after_server_seq
          schema:
            type: integer
            format: int64
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Server-stored encrypted history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatHistoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'
  /v0/chats/{chat_id}/members:add:
    post:
      operationId: addChatMembers
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatMembersRequest'
      responses:
        '200':
          description: Accounts added to the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatMembersResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/members:remove:
    post:
      operationId: removeChatMembers
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatMembersRequest'
      responses:
        '200':
          description: Accounts removed from the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatMembersResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/devices:add:
    post:
      operationId: addChatDevices
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatDevicesRequest'
      responses:
        '200':
          description: Devices added to the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatDevicesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/chats/{chat_id}/devices:remove:
    post:
      operationId: removeChatDevices
      tags: [chats]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChatId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModifyChatDevicesRequest'
      responses:
        '200':
          description: Devices removed from the chat and epoch advanced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModifyChatDevicesResponse'
        '409':
          $ref: '#/components/responses/Conflict'
  /v0/inbox:
    get:
      operationId: getInbox
      tags: [inbox]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: after_inbox_id
          schema:
            type: integer
            format: int64
            minimum: 0
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 500
      responses:
        '200':
          description: Pending inbox items for the authenticated device
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InboxResponse'
  /v0/inbox/ack:
    post:
      operationId: ackInbox
      tags: [inbox]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AckInboxRequest'
      responses:
        '200':
          description: Inbox items acknowledged
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AckInboxResponse'
  /v0/inbox/lease:
    post:
      operationId: leaseInbox
      tags: [inbox]
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LeaseInboxRequest'
      responses:
        '200':
          description: Inbox items leased for temporary delivery ownership
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaseInboxResponse'
  /v0/blobs/uploads:
    post:
      operationId: createBlobUpload
      tags: [blobs]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBlobUploadRequest'
      responses:
        '200':
          description: Blob upload slot created or reused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBlobUploadResponse'
  /v0/blobs/{blob_id}:
    put:
      operationId: putBlob
      tags: [blobs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlobId'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: Blob stored and marked available
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlobMetadataResponse'
    get:
      operationId: getBlob
      tags: [blobs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlobId'
      responses:
        '200':
          description: Encrypted blob bytes
          headers:
            ETag:
              schema:
                type: string
            X-Trix-Blob-Id:
              schema:
                type: string
            X-Trix-Blob-Mime-Type:
              schema:
                type: string
            X-Trix-Blob-Sha256-B64:
              schema:
                type: string
            X-Trix-Blob-Upload-Status:
              schema:
                $ref: '#/components/schemas/BlobUploadStatus'
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/NotFound'
    head:
      operationId: headBlob
      tags: [blobs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BlobId'
      responses:
        '200':
          description: Blob metadata as headers
          headers:
            Content-Length:
              schema:
                type: integer
                format: int64
            Content-Type:
              schema:
                type: string
            ETag:
              schema:
                type: string
            X-Trix-Blob-Id:
              schema:
                type: string
            X-Trix-Blob-Mime-Type:
              schema:
                type: string
            X-Trix-Blob-Sha256-B64:
              schema:
                type: string
            X-Trix-Blob-Upload-Status:
              schema:
                $ref: '#/components/schemas/BlobUploadStatus'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    AccountId:
      in: path
      name: account_id
      required: true
      schema:
        type: string
        format: uuid
    ChatId:
      in: path
      name: chat_id
      required: true
      schema:
        type: string
        format: uuid
    BlobId:
      in: path
      name: blob_id
      required: true
      schema:
        type: string
    DeviceId:
      in: path
      name: device_id
      required: true
      schema:
        type: string
        format: uuid
    LinkIntentId:
      in: path
      name: link_intent_id
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current server state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotImplemented:
      description: Endpoint scaffold exists but behavior is not implemented yet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Uuid:
      type: string
      format: uuid
    ServiceStatus:
      type: string
      enum: [ok, degraded]
    DeviceStatus:
      type: string
      enum: [pending, active, revoked]
    HistorySyncJobType:
      type: string
      enum: [initial_sync, chat_backfill, device_rekey]
    HistorySyncJobStatus:
      type: string
      enum: [pending, running, completed, failed, canceled]
    BlobUploadStatus:
      type: string
      enum: [pending_upload, available]
    ChatType:
      type: string
      enum: [dm, group, account_sync]
    MessageKind:
      type: string
      enum: [application, commit, welcome_ref, system]
    ContentType:
      type: string
      enum: [text, reaction, receipt, attachment, chat_event]
    HealthResponse:
      type: object
      required: [service, status, version, uptime_ms]
      properties:
        service:
          type: string
        status:
          $ref: '#/components/schemas/ServiceStatus'
        version:
          type: string
        uptime_ms:
          type: integer
          format: int64
    VersionResponse:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
        version:
          type: string
        git_sha:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    CreateAccountRequest:
      type: object
      required:
        - profile_name
        - device_display_name
        - platform
        - credential_identity_b64
        - account_root_pubkey_b64
        - account_root_signature_b64
        - transport_pubkey_b64
      properties:
        handle:
          type: string
          nullable: true
        profile_name:
          type: string
        profile_bio:
          type: string
          nullable: true
        device_display_name:
          type: string
        platform:
          type: string
        credential_identity_b64:
          type: string
        account_root_pubkey_b64:
          type: string
        account_root_signature_b64:
          type: string
        transport_pubkey_b64:
          type: string
    CreateAccountResponse:
      type: object
      required: [account_id, device_id, account_sync_chat_id]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        device_id:
          $ref: '#/components/schemas/Uuid'
        account_sync_chat_id:
          $ref: '#/components/schemas/Uuid'
    AuthChallengeRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          $ref: '#/components/schemas/Uuid'
    AuthChallengeResponse:
      type: object
      required: [challenge_id, challenge_b64, expires_at_unix]
      properties:
        challenge_id:
          type: string
          format: uuid
        challenge_b64:
          type: string
        expires_at_unix:
          type: integer
          format: int64
    AuthSessionRequest:
      type: object
      required: [device_id, challenge_id, signature_b64]
      properties:
        device_id:
          $ref: '#/components/schemas/Uuid'
        challenge_id:
          type: string
          format: uuid
        signature_b64:
          type: string
    AuthSessionResponse:
      type: object
      required: [access_token, expires_at_unix, account_id, device_status]
      properties:
        access_token:
          type: string
        expires_at_unix:
          type: integer
          format: int64
        account_id:
          $ref: '#/components/schemas/Uuid'
        device_status:
          $ref: '#/components/schemas/DeviceStatus'
    AccountProfileResponse:
      type: object
      required: [account_id, profile_name, device_id, device_status]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        handle:
          type: string
          nullable: true
        profile_name:
          type: string
        profile_bio:
          type: string
          nullable: true
        device_id:
          $ref: '#/components/schemas/Uuid'
        device_status:
          $ref: '#/components/schemas/DeviceStatus'
    DeviceSummary:
      type: object
      required: [device_id, display_name, platform, device_status]
      properties:
        device_id:
          $ref: '#/components/schemas/Uuid'
        display_name:
          type: string
        platform:
          type: string
        device_status:
          $ref: '#/components/schemas/DeviceStatus'
    DeviceListResponse:
      type: object
      required: [account_id, devices]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceSummary'
    CreateLinkIntentResponse:
      type: object
      required: [link_intent_id, qr_payload, expires_at_unix]
      properties:
        link_intent_id:
          type: string
          format: uuid
        qr_payload:
          type: string
        expires_at_unix:
          type: integer
          format: int64
    CompleteLinkIntentRequest:
      type: object
      required:
        - link_token
        - device_display_name
        - platform
        - credential_identity_b64
        - transport_pubkey_b64
      properties:
        link_token:
          type: string
          format: uuid
        device_display_name:
          type: string
        platform:
          type: string
        credential_identity_b64:
          type: string
        transport_pubkey_b64:
          type: string
        key_packages:
          type: array
          items:
            $ref: '#/components/schemas/PublishKeyPackageItem'
    CompleteLinkIntentResponse:
      type: object
      required: [account_id, pending_device_id, device_status, bootstrap_payload_b64]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        pending_device_id:
          $ref: '#/components/schemas/Uuid'
        device_status:
