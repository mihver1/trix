components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    adminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HS256 admin JWT signed with TRIX_ADMIN_JWT_SIGNING_KEY (distinct from consumer tokens)
  parameters:
    AccountId:
      in: path
      name: account_id
      required: true
      schema:
        type: string
        format: uuid
    ChatId:
      in: path
      name: chat_id
      required: true
      schema:
        type: string
        format: uuid
    BlobId:
      in: path
      name: blob_id
      required: true
      schema:
        type: string
    DeviceId:
      in: path
      name: device_id
      required: true
      schema:
        type: string
        format: uuid
    LinkIntentId:
      in: path
      name: link_intent_id
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      in: path
      name: job_id
      required: true
      schema:
        type: string
        format: uuid
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Request conflicts with current server state
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Authentication failed or missing credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Request was rate limited
      headers:
        Retry-After:
          description: Seconds until the caller should retry.
          schema:
            type: integer
            format: int64
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotImplemented:
      description: Endpoint scaffold exists but behavior is not implemented yet.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    Uuid:
      type: string
      format: uuid
    ServiceStatus:
      type: string
      enum: [ok, degraded]
    DeviceStatus:
      type: string
      enum: [pending, active, revoked]
    HistorySyncJobType:
      type: string
      enum: [initial_sync, chat_backfill, device_rekey, timeline_repair]
    HistorySyncJobRole:
      type: string
      enum: [source, target]
    HistorySyncJobStatus:
      type: string
      enum: [pending, running, completed, failed, canceled]
    BlobUploadStatus:
      type: string
      enum: [pending_upload, available]
    ChatType:
      type: string
      enum: [dm, group, account_sync]
    MessageKind:
      type: string
      enum: [application, commit, welcome_ref, system]
    ContentType:
      type: string
      enum: [text, reaction, receipt, attachment, chat_event]
    HealthResponse:
      type: object
      required: [service, status, version, uptime_ms]
      properties:
        service:
          type: string
        status:
          $ref: '#/components/schemas/ServiceStatus'
        version:
          type: string
        uptime_ms:
          type: integer
          format: int64
    VersionResponse:
      type: object
      required: [service, version]
      properties:
        service:
          type: string
        version:
          type: string
        git_sha:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
    CreateAccountRequest:
      type: object
      required:
        - profile_name
        - device_display_name
        - platform
        - credential_identity_b64
        - account_root_pubkey_b64
        - account_root_signature_b64
        - transport_pubkey_b64
      properties:
        handle:
          type: string
          nullable: true
        profile_name:
          type: string
        profile_bio:
          type: string
          nullable: true
        device_display_name:
          type: string
        platform:
          type: string
        credential_identity_b64:
          type: string
        account_root_pubkey_b64:
          type: string
        account_root_signature_b64:
          type: string
        transport_pubkey_b64:
          type: string
        provision_token:
          type: string
          nullable: true
          description: Required when public self-service registration is disabled; one-time token from POST /v0/admin/users
    CreateAccountResponse:
      type: object
      required: [account_id, device_id, account_sync_chat_id]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        device_id:
          $ref: '#/components/schemas/Uuid'
        account_sync_chat_id:
          $ref: '#/components/schemas/Uuid'
    AuthChallengeRequest:
      type: object
      required: [device_id]
      properties:
        device_id:
          $ref: '#/components/schemas/Uuid'
    AuthChallengeResponse:
      type: object
      required: [challenge_id, challenge_b64, expires_at_unix]
      properties:
        challenge_id:
          type: string
          format: uuid
        challenge_b64:
          type: string
        expires_at_unix:
          type: integer
          format: int64
    AuthSessionRequest:
      type: object
      required: [device_id, challenge_id, signature_b64]
      properties:
        device_id:
          $ref: '#/components/schemas/Uuid'
        challenge_id:
          type: string
          format: uuid
        signature_b64:
          type: string
    AuthSessionResponse:
      type: object
      required: [access_token, expires_at_unix, account_id, device_status]
      properties:
        access_token:
          type: string
        expires_at_unix:
          type: integer
          format: int64
        account_id:
          $ref: '#/components/schemas/Uuid'
        device_status:
          $ref: '#/components/schemas/DeviceStatus'
    AccountProfileResponse:
      type: object
      required: [account_id, profile_name, device_id, device_status]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        handle:
          type: string
          nullable: true
        profile_name:
          type: string
        profile_bio:
          type: string
          nullable: true
        device_id:
          $ref: '#/components/schemas/Uuid'
        device_status:
          $ref: '#/components/schemas/DeviceStatus'
    DirectoryAccountSummary:
      type: object
      required: [account_id, profile_name]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        handle:
          type: string
          nullable: true
        profile_name:
          type: string
        profile_bio:
          type: string
          nullable: true
    ChatParticipantProfileSummary:
      type: object
      required: [account_id, profile_name]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        handle:
          type: string
          nullable: true
        profile_name:
          type: string
        profile_bio:
          type: string
          nullable: true
    AccountDirectoryResponse:
      type: object
      required: [accounts]
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/DirectoryAccountSummary'
    UpdateAccountProfileRequest:
      type: object
      required: [profile_name]
      properties:
        handle:
          type: string
          nullable: true
        profile_name:
          type: string
        profile_bio:
          type: string
          nullable: true
    DeviceSummary:
      type: object
      required: [device_id, display_name, platform, device_status]
      properties:
        device_id:
          $ref: '#/components/schemas/Uuid'
        display_name:
          type: string
        platform:
          type: string
        device_status:
          $ref: '#/components/schemas/DeviceStatus'
    DeviceListResponse:
      type: object
      required: [account_id, devices]
      properties:
        account_id:
          $ref: '#/components/schemas/Uuid'
        devices:
          type: array
          items:
            $ref: '#/components/schemas/DeviceSummary'
    ApplePushEnvironment:
      type: string
      enum: [sandbox, production]
    RegisterApplePushTokenRequest:
      type: object
      required: [token_hex, environment]
      properties:
        token_hex:
          type: string
