define_macro:
  HOST: trix.selfhost.ru
  ADMIN: admin@trix.selfhost.ru
  PORT_C2S: 5222
  PORT_HTTP: 5280
  PORT_COMPONENT: 5347
  STARTTLS_REQUIRED: true
  PUSH_COMPONENT_SECRET: dev-local-push-component-secret-change-me

hosts:
  - HOST

loglevel: info

sql_type: sqlite
sql_database: "/opt/ejabberd/database/ejabberd-mam.sqlite"
update_sql_schema: true

certfiles:
  - /opt/ejabberd/conf/certs/*.pem

ca_file: /opt/ejabberd/conf/cacert.pem

listen:
  -
    port: PORT_C2S
    ip: "0.0.0.0"
    module: ejabberd_c2s
    max_stanza_size: 262144
    shaper: c2s_shaper
    access: c2s
    starttls_required: STARTTLS_REQUIRED
  -
    port: PORT_HTTP
    ip: "0.0.0.0"
    module: ejabberd_http
    request_handlers:
      /api: mod_http_api
      /upload: mod_http_upload
  -
    port: PORT_COMPONENT
    ip: "0.0.0.0"
    module: ejabberd_service
    check_from: true
    global_routes: false
    shaper: fast
    max_stanza_size: 65536
    hosts:
      "push.trix.selfhost.ru":
        password: PUSH_COMPONENT_SECRET

# No ejabberd_s2s_in listener is configured, and outgoing S2S is denied.
s2s_access: none

acl:
  local:
    user_regexp: ""
  loopback:
    ip:
      - 127.0.0.0/8
      - ::1/128
  admin:
    user:
      - ADMIN

access_rules:
  local:
    allow: local
  c2s:
    deny: blocked
    allow: all
  configure:
    allow: admin
  muc_create:
    allow: local
  trusted_control_plane:
    allow: loopback

api_permissions:
  "control-plane localhost":
    from:
      - mod_http_api
      - ejabberd_ctl
    who: all
    what:
      - "*"
      - "!stop"
      - "!start"

shaper:
  normal:
    rate: 3000
    burst_size: 20000

shaper_rules:
  max_user_sessions: 10
  max_user_offline_messages:
    5000: admin
    100: all
  c2s_shaper:
    none: admin
    normal: all

modules:
  mod_adhoc: {}
  mod_adhoc_api: {}
  mod_admin_extra: {}
  mod_avatar: {}
  mod_blocking: {}
  mod_caps: {}
  mod_carboncopy: {}
  mod_client_state:
    queue_chat_states: false
    queue_pep: false
    queue_presence: false
  mod_configure: {}
  mod_disco: {}
  mod_fail2ban: {}
  mod_http_api: {}
  mod_http_upload:
    access: local
    hosts:
      - "upload.@HOST@"
    docroot: /opt/ejabberd/upload
    put_url: "https://@HOST@/upload"
    get_url: "https://@HOST@/upload"
    max_size: 16777216
    thumbnail: false
    rm_on_unregister: true
  mod_last: {}
  mod_mam:
    db_type: sql
    assume_mam_usage: true
    default: always
  mod_muc:
    host: conference.@HOST@
    access:
      - allow
    access_admin:
      - allow: admin
    access_create: muc_create
    access_persistent: muc_create
    access_mam:
      - allow
    default_room_options:
      mam: true
      persistent: true
      members_only: true
      anonymous: false
      public: false
      public_list: false
  mod_muc_admin: {}
  mod_offline:
    access_max_user_messages: max_user_offline_messages
  mod_ping: {}
  mod_privacy: {}
  mod_private: {}
  mod_pubsub:
    access_createnode: local
    plugins:
      - flat
      - pep
    force_node_config:
      storage:bookmarks:
        access_model: whitelist
  mod_push:
    include_body: false
    include_sender: false
    notify_on: messages
  mod_roster:
    versioning: true
  mod_stream_mgmt:
    resend_on_timeout: if_offline
  mod_vcard:
    search: true
    hosts:
      - vjud.@HOST@
    matches: 50
    allow_return_all: true
    search_all_hosts: false
  mod_vcard_xupdate: {}
  mod_version:
    show_os: false
