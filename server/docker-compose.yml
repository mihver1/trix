services:
  conduit:
    image: docker.io/matrixconduit/matrix-conduit:latest
    restart: unless-stopped
    environment:
      CONDUIT_CONFIG: /etc/conduit/conduit.toml
      CONDUIT_SERVER_NAME: ${TRIX_MATRIX_DOMAIN:-trix.selfhost.ru}
      CONDUIT_REGISTRATION_TOKEN: ${CONDUIT_REGISTRATION_TOKEN:-CHANGE_ME_REGISTRATION_TOKEN}
      CONDUIT_LOG: ${CONDUIT_LOG:-warn}
    ports:
      - "127.0.0.1:6167:6167"
    volumes:
      - ./conduit.toml:/etc/conduit/conduit.toml:ro
      - conduit-data:/var/lib/matrix-conduit

  caddy:
    image: docker.io/caddy:2
    restart: unless-stopped
    profiles:
      - caddy
    depends_on:
      - conduit
    environment:
      TRIX_MATRIX_DOMAIN: ${TRIX_MATRIX_DOMAIN:-trix.selfhost.ru}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  conduit-data:
  caddy-data:
  caddy-config:
