[global]
address = "0.0.0.0"
port = 6167

# Treat this as permanent once real users exist. Matrix user IDs and room IDs
# include the server name.
server_name = "trix.selfhost.ru"

database_backend = "rocksdb"
database_path = "/var/lib/matrix-conduit"
db_cache_capacity_mb = 64.0
pdu_cache_capacity = 50_000
cleanup_second_interval = 60

# Small private-server limits.
max_request_size = 10_000_000
max_concurrent_requests = 50
max_fetch_prev_events = 50

# Registration should be enabled only during bootstrap, protected by a token.
allow_registration = true
registration_token = "CHANGE_ME_REGISTRATION_TOKEN"

allow_encryption = true
allow_federation = false
allow_room_creation = true
allow_unstable_room_versions = false
default_room_version = "10"

allow_check_for_updates = false
enable_lightning_bolt = false
trusted_servers = []
log = "warn"

# Do not set emergency_password by default. Conduit treats the key as active
# even when the value is empty; only add it during a documented recovery flow.

[global.media]
backend = "filesystem"
path = "/var/lib/matrix-conduit/media"

[global.media.directory_structure]
depth = 2
length = 2

[[global.media.retention]]
scope = "remote"
created = "30days"
space = "2GB"

[[global.media.retention]]
scope = "thumbnail"
created = "30days"
space = "512MB"
