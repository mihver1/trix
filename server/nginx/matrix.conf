server {
    listen 443 ssl http2;
    server_name trix.selfhost.ru;

    # Replace these with certificates managed by your VPS automation.
    ssl_certificate /etc/letsencrypt/live/trix.selfhost.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trix.selfhost.ru/privkey.pem;

    location = /.well-known/matrix/client {
        add_header Access-Control-Allow-Origin "*" always;
        default_type application/json;
        return 200 '{"m.homeserver":{"base_url":"https://trix.selfhost.ru"}}';
    }

    location /_matrix/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /_conduit/ {
        proxy_pass http://127.0.0.1:6167;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        return 404;
    }
}

server {
    listen 80;
    server_name trix.selfhost.ru;
    return 301 https://$host$request_uri;
}
