name: TrixMatrix

options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.2.11

packages:
  Martin:
    url: https://github.com/tigase/Martin
    exactVersion: 3.2.4
  MartinOMEMO:
    url: https://github.com/tigase/MartinOMEMO
    exactVersion: 2.2.3
  LiveKit:
    url: https://github.com/livekit/client-sdk-swift.git
    exactVersion: 2.9.0

targets:
  TrixMatrixiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        NSCameraUsageDescription: Trix uses the camera for encrypted direct video calls.
        NSMicrophoneUsageDescription: Trix uses the microphone for encrypted direct and group voice calls.
        UILaunchScreen: {}
        UIBackgroundModes:
          - audio
          - voip
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    sources:
      - path: Sources/SharedFeatureFlags
      - path: Sources/Shared
      - path: Sources/iOS
    dependencies:
      - package: Martin
        product: Martin
      - package: MartinOMEMO
        product: MartinOMEMO
      - package: LiveKit
        product: LiveKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp
        PRODUCT_NAME: Trix
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TrixiOS.entitlements
        DEVELOPMENT_TEAM: HGY33KYKQ2
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: development
        Release:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: production

  TrixMatrixMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    info:
      path: Sources/macOS/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.social-networking
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSCameraUsageDescription: Trix uses the camera for encrypted direct video calls.
        NSMicrophoneUsageDescription: Trix uses the microphone for encrypted direct and group voice calls.
    sources:
      - path: Sources/SharedFeatureFlags
      - path: Sources/Shared
      - path: Sources/macOS
    dependencies:
      - package: Martin
        product: Martin
      - package: MartinOMEMO
        product: MartinOMEMO
      - package: LiveKit
        product: LiveKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp
        PRODUCT_NAME: Trix
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TrixMac.entitlements
        DEVELOPMENT_TEAM: HGY33KYKQ2
      configs:
        Debug:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: development
        Release:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: production

  TrixAdminMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    info:
      path: Sources/Admin/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.developer-tools
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
    sources:
      - path: Sources/SharedFeatureFlags
      - path: Sources/Admin
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trix.admin
        PRODUCT_NAME: Trix Admin
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: HGY33KYKQ2

  TrixMatrixMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/Shared
    dependencies:
      - target: TrixMatrixMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Trix.app/Contents/MacOS/Trix
        BUNDLE_LOADER: $(TEST_HOST)
