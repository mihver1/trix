name: TrixMatrix

options:
  minimumXcodeGenVersion: 2.44.0
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0

packages:
  Martin:
    url: https://github.com/tigase/Martin
    exactVersion: 3.2.4
  MartinOMEMO:
    url: https://github.com/tigase/MartinOMEMO
    exactVersion: 2.2.3

targets:
  TrixMatrixiOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
    dependencies:
      - package: Martin
        product: Martin
      - package: MartinOMEMO
        product: MartinOMEMO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp
        PRODUCT_NAME: Trix
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TrixiOS.entitlements
        DEVELOPMENT_TEAM: HGY33KYKQ2
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIBackgroundModes: remote-notification
        INFOPLIST_KEY_NSFaceIDUsageDescription: Unlock Trix to view chats and settings.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        TARGETED_DEVICE_FAMILY: "1,2"
      configs:
        Debug:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: development
        Release:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: production

  TrixMatrixMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    info:
      path: Sources/macOS/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        ITSAppUsesNonExemptEncryption: false
        LSApplicationCategoryType: public.app-category.social-networking
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
    sources:
      - path: Sources/Shared
      - path: Sources/macOS
    dependencies:
      - package: Martin
        product: Martin
      - package: MartinOMEMO
        product: MartinOMEMO
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp
        PRODUCT_NAME: Trix
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: TrixMac.entitlements
        DEVELOPMENT_TEAM: HGY33KYKQ2
      configs:
        Debug:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: development
        Release:
          TRIX_APNS_ENTITLEMENT_ENVIRONMENT: production

  TrixMatrixMacTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests/Shared
    dependencies:
      - target: TrixMatrixMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.softgrid.trixapp.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Trix.app/Contents/MacOS/Trix
        BUNDLE_LOADER: $(TEST_HOST)
